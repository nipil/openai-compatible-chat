# https://github.com/actions/runner-images

name: Release

on:
  push:
    tags:
      - "v*"           # déclenché par : git tag v1.0.0 && git push --tags
    branches:
      - ci-test        # pour tester les builds sans faire de release

permissions:
  contents: write      # nécessaire pour créer la release GitHub

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    env:
      # pour que le binaire puisse tourner macOS 12+
      MACOSX_DEPLOYMENT_TARGET: "12.0"

    strategy:
      matrix:
        include:
          - name:   Linux x64 (static)
            os:     ubuntu-22.04
            target: x86_64-unknown-linux-musl
            binary: openai-compatible-chat

          - name:   Windows x64
            os:     windows-2022
            target: x86_64-pc-windows-msvc
            binary: openai-compatible-chat.exe

          - name:   macOS ARM
            os:     macos-15
            target: aarch64-apple-darwin
            binary: openai-compatible-chat

          - name:   macOS Intel
            os:     macos-15
            target: x86_64-apple-darwin
            binary: openai-compatible-chat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache .cargo/registry + target/ entre les runs pour accélérer la CI
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux musl (static)
      - name: Install musl tools
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      # Strip (Unix)
      - name: Strip binary (Unix)
        if: matrix.os != 'windows-2022'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      # Strip (Windows)
      - name: Strip binary (Windows)
        if: matrix.os == 'windows-2022'
        shell: bash
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      # Rename Linux
      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             openai-compatible-chat-${{ matrix.target }}

      # Rename Windows
      - name: Rename binary (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          Move-Item target/${{ matrix.target }}/release/${{ matrix.binary }} `
                    openai-compatible-chat-${{ matrix.target }}.exe

      # Rename macOS
      - name: Rename binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             openai-compatible-chat-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openai-compatible-chat-${{ matrix.target }}
          path: openai-compatible-chat-${{ matrix.target }}*   # capture .exe aussi

  macos-universal:
    name: Build macOS universal binary
    needs: build
    runs-on: macos-15

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create universal binary
        run: |
          mkdir macos

          cp artifacts/openai-compatible-chat-aarch64-apple-darwin/openai-compatible-chat-aarch64-apple-darwin macos/openai-compatible-chat-arm64
          cp artifacts/openai-compatible-chat-x86_64-apple-darwin/openai-compatible-chat-x86_64-apple-darwin macos/openai-compatible-chat-x64

          lipo -create macos/openai-compatible-chat-arm64 macos/openai-compatible-chat-x64 -o macos/openai-compatible-chat-macos
          chmod +x macos/openai-compatible-chat-macos

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: openai-compatible-chat-macos
          path: macos/openai-compatible-chat-macos

  release:
    name: Create GitHub Release
    needs:
      - build
      - macos-universal
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')   # ← skip sur les branches
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true  # génère les notes depuis les commits
