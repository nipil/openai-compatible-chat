<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears -->
  <polygon points="22,44 12,8 38,34"  fill="#F5A623"/>
  <polygon points="78,44 88,8 62,34"  fill="#F5A623"/>
  <!-- Inner ears -->
  <polygon points="23,41 17,14 35,33" fill="#FFD0B5"/>
  <polygon points="77,41 83,14 65,33" fill="#FFD0B5"/>
  <!-- Face -->
  <circle cx="50" cy="62" r="36" fill="#F5A623"/>
  <!-- Eyes -->
  <ellipse cx="37" cy="57" rx="6" ry="7.5" fill="#1A1A2E"/>
  <ellipse cx="63" cy="57" rx="6" ry="7.5" fill="#1A1A2E"/>
  <!-- Eye shine -->
  <circle cx="39" cy="54" r="2" fill="white"/>
  <circle cx="65" cy="54" r="2" fill="white"/>
  <!-- Nose -->
  <polygon points="50,67 46,72 54,72" fill="#FF8FAB"/>
  <!-- Mouth -->
  <path d="M46,72 Q40,79 34,75" stroke="#1A1A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M54,72 Q60,79 66,75" stroke="#1A1A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="6"  y1="64" x2="41" y2="66" stroke="#555" stroke-width="1" stroke-linecap="round"/>
  <line x1="6"  y1="71" x2="41" y2="70" stroke="#555" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="94" y1="64" x2="59" y2="66" stroke="#555" stroke-width="1" stroke-linecap="round"/>
  <line x1="94" y1="71" x2="59" y2="70" stroke="#555" stroke-width="1" stroke-linecap="round"/>
</svg>