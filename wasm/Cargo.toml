[package]
name = "wasm"
version = "0.1.0"
edition = "2024"

[dependencies]
# turns WASM panics into readable browser console messages
console_error_panic_hook = "0.1"
gloo-net = { version = "0.7", features = ["http"] }
js-sys = "0.3"
leptos = { version = "0.8", features = ["csr"] }
portable.workspace = true
pulldown-cmark = { version = "0.13", default-features = false, features = [
    "html",
] }
send_wrapper = "0.6"
serde_json.workspace = true
serde.workspace = true
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",                     # cookie r/w + data-theme attribute + scroll
    "Request",
    "RequestInit",
    "Headers",
    "Response",
    "ReadableStream",
    "ReadableStreamDefaultReader",
    "Storage",
    "AbortController",
    "AbortSignal",
    "KeyboardEvent",
    "HtmlDocument",
] }

[features]
print-tokens = []
