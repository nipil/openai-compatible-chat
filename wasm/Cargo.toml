[package]
name = "frontend"
version = "0.1.0"
edition = "2024"

[dependencies]
leptos = { version = "0.7", features = ["csr"] }
gloo-net = { version = "0.6", features = ["http"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
send_wrapper = "0.6"
pulldown-cmark = { version = "0.12", default-features = false, features = [
    "html",
] }
# turns WASM panics into readable browser console messages
console_error_panic_hook = "0.1"

[dependencies.web-sys]
version = "0.3"

features = [
    "Window",
    "Document",
    "Element",                     # cookie r/w + data-theme attribute + scroll
    "Request",
    "RequestInit",
    "Headers",
    "Response",
    "ReadableStream",
    "ReadableStreamDefaultReader",
    "AbortController",
    "AbortSignal",
    "KeyboardEvent",
]
